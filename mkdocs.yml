site_name: Learning Graphs
site_description: 'A microsite for teaching how to create and maintain learning graphs (concept dependency graphs) for education.'
site_author: 'Dan McCreary'
repo_name: 'GitHub Repo'
site_url: 'https://dmccreary.github.io/learning-graphs/'
repo_url: 'https://github.com/dmccreary/learning-graphs'
edit_uri: 'blob/master/docs'

# Hooks — runs local Python before/after page processing.
# `plugins/social_override.py` overrides og:image and twitter:image on any
# page that declares an `image:` in its frontmatter (e.g. docs/index.md ->
# img/cover.png), making that image the social-media preview card. Pages
# with no `image:` are left untouched, so Material's defaults (and the
# `social` plugin's auto-generated cards, if enabled) pass through.
# NOTE: `hooks:` MUST be a top-level key, not nested under `plugins:`.
hooks:
  - plugins/social_override.py

