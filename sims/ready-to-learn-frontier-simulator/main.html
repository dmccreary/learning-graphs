<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="schema" content="https://dmccreary.github.io/intelligent-textbooks/ns/microsim/v1">
    <title>Ready-to-Learn Frontier Simulator</title>
    <script src="https://cdn.jsdelivr.net/npm/vis-network@9.1.9/standalone/umd/vis-network.min.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/vis-network/styles/vis-network.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <!-- Network canvas - full width/height background layer -->
        <div id="network"></div>

        <!-- Title at top center -->
        <div class="title">Ready-to-Learn Frontier Simulator</div>

        <!-- Legend in upper left -->
        <div class="legend">
            <div class="legend-item">
                <div class="legend-color color-learned"></div>
                <span><strong>Learned</strong></span>
            </div>
            <div class="legend-item">
                <div class="legend-color color-ready"></div>
                <span><strong>Ready to learn</strong> &ndash; click it</span>
            </div>
            <div class="legend-item">
                <div class="legend-color color-notready"></div>
                <span><strong>Not yet ready</strong></span>
            </div>
        </div>

        <!-- Right panel with controls and live ready-to-learn set -->
        <div class="right-panel">
            <div class="controls">
                <button class="btn btn-secondary" id="reset-btn">Reset</button>
            </div>

            <div class="info-panel">
                <div class="info-title">Ready to Learn</div>
                <ul class="ready-list" id="ready-list">
                    <li class="ready-empty">None</li>
                </ul>
            </div>

            <div class="status-panel">
                <div class="status-title">How to Use:</div>
                <div class="status-text">
                    <ul>
                        <li><strong>Click a gold node</strong> to mark it learned</li>
                        <li>Watch newly unlocked concepts pulse to <strong>gold</strong></li>
                        <li>A concept turns gold once <em>all</em> its prerequisites are learned</li>
                    </ul>
                </div>
            </div>
        </div>
    </div>

    <script src="ready-to-learn-frontier-simulator.js"></script>
</body>
</html>
