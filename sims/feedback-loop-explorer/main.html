<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="schema" content="https://dmccreary.github.io/intelligent-textbooks/ns/microsim/v1">
    <title>Assessment Feedback Loop Explorer</title>
    <script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body {
            width: 100%;
            height: 100%;
            font-family: Arial, Helvetica, sans-serif;
            background: #ffffff;
            color: #212529;
            overflow: hidden;
        }
        #layout {
            display: flex;
            flex-direction: column;
            width: 100%;
            height: 100%;
            padding: 10px 14px;
        }
        h1 {
            font-size: 20px;
            color: #2c2c6c;
            margin-bottom: 4px;
        }
        .subtitle {
            font-size: 13px;
            color: #555;
            margin-bottom: 8px;
        }
        /* Diagram + infobox: side-by-side on wide screens, stacked when narrow */
        #main-area {
            display: flex;
            flex-direction: row;
            gap: 12px;
            flex: 1;
            min-height: 0;
        }
        #diagram-wrap {
            flex: 1 1 62%;
            background-color: aliceblue;
            border-radius: 6px;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 8px;
            min-width: 0;
        }
        .mermaid { width: 100%; }
        .mermaid svg { max-width: 100%; height: auto; display: block; margin: 0 auto; }
        #infobox {
            flex: 1 1 38%;
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            border-radius: 6px;
            padding: 14px;
            font-size: 14px;
            line-height: 1.5;
            color: #334155;
            overflow-y: auto;
        }
        #infobox .info-title {
            font-size: 16px;
            font-weight: bold;
            color: #3730a3;
            margin-bottom: 8px;
        }
        #infobox .placeholder { color: #64748b; font-style: italic; }
        .node { cursor: pointer; }
        /* Highlight the most recently clicked node in gold */
        .node.selected rect { fill: #f5b301 !important; stroke: #b8860b !important; }
        .node.selected .nodeLabel,
        .node.selected span { color: #212529 !important; }
        .edgeLabel .loop-hot { cursor: pointer; }
        @media (max-width: 600px) {
            #main-area { flex-direction: column; }
            #diagram-wrap, #infobox { flex: none; }
            #infobox { min-height: 120px; }
        }
    </style>
</head>
<body>
    <div id="layout">
        <h1>Assessment Feedback Loop Explorer</h1>
        <div class="subtitle">Click each stage &mdash; and the &ldquo;repeats&rdquo; arrow &mdash; to see why assessment is a loop, not a one-time event.</div>
        <div id="main-area">
            <div id="diagram-wrap">
                <div class="mermaid" id="theDiagram"></div>
            </div>
            <div id="infobox">
                <div class="placeholder">Click a stage in the loop to read what happens there.</div>
            </div>
        </div>
    </div>
    <script src="feedback-loop-explorer.js"></script>
</body>
</html>
