<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="schema" content="https://dmccreary.github.io/intelligent-textbooks/ns/microsim/v1">
    <title>Choosing a Quiz Format: Multiple-Choice vs. True/False</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Roboto', Helvetica, Arial, sans-serif;
            background-color: aliceblue;
            color: #333;
            line-height: 1.5;
        }

        .container {
            max-width: 700px;
            margin: 0 auto;
            padding: 8px;
        }

        h2 {
            text-align: center;
            margin-bottom: 6px;
            color: #2c3e50;
            font-size: 1.25rem;
            font-weight: 600;
        }

        /* Recommendation control row. On wide screens it sits below the title,
           above the chart; on narrow screens it stays above the chart too. */
        .controls {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin: 4px auto 8px auto;
            max-width: 560px;
        }

        .controls label {
            font-size: 14px;
            font-weight: 600;
            color: #495057;
        }

        .controls select {
            font-size: 14px;
            padding: 6px 10px;
            border-radius: 6px;
            border: 1px solid #ced4da;
            background-color: #fff;
            color: #333;
            cursor: pointer;
            max-width: 100%;
        }

        #recommendation {
            width: 100%;
            max-width: 560px;
            margin: 0 auto 8px auto;
            min-height: 48px;
            padding: 8px 12px;
            border-radius: 6px;
            font-size: 14px;
            text-align: center;
            background-color: #eef4fb;
            border: 1px solid #d5e3f2;
            color: #2c3e50;
        }

        #recommendation .rec-format {
            font-weight: 700;
        }

        .chart-container {
            position: relative;
            width: 100%;
            max-width: 560px;
            height: 420px;
            margin: 0 auto;
        }

        /* Spec: on viewports narrower than 500px the recommendation dropdown
           moves above the chart. Flexbox order keeps controls ahead of chart. */
        @media (max-width: 500px) {
            .container {
                display: flex;
                flex-direction: column;
            }
            h2 { order: 1; }
            .controls { order: 2; }
            #recommendation { order: 3; }
            .chart-container { order: 4; height: 340px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>Choosing a Quiz Format: Multiple-Choice vs. True/False</h2>

        <div class="controls">
            <label for="goalSelect">Recommend a format for&hellip;</label>
            <select id="goalSelect">
                <option value="none" selected>Choose an assessment goal&hellip;</option>
                <option value="recall">Quick 10-question recall check</option>
                <option value="misconception">Diagnose a specific misconception</option>
                <option value="fast-author">Write a large quiz bank fast</option>
                <option value="guess-proof">Minimize lucky guessing</option>
            </select>
        </div>

        <div id="recommendation">
            Pick a goal above to see which format fits best, or hover any point
            to read why it earned its score.
        </div>

        <div class="chart-container">
            <canvas id="formatRadar"></canvas>
        </div>
    </div>

    <script src="quiz-format-comparison-chart.js"></script>
</body>
</html>
