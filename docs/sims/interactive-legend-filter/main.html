<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="schema" content="https://dmccreary.github.io/intelligent-textbooks/ns/microsim/v1">
    <title>Interactive Legend Filter</title>
    <script src="https://cdn.jsdelivr.net/npm/vis-network@9.1.9/standalone/umd/vis-network.min.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/vis-network/styles/vis-network.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <!-- Network canvas: overlays MUST be siblings, never children. -->
        <div id="network"></div>

        <!-- Title at top center -->
        <div class="title">Interactive Legend Filter</div>

        <!-- Interactive legend panel: right sidebar on wide screens.
             Each row is a clickable filter tied to the DataSet. -->
        <div class="legend-panel">
            <div class="legend-header">
                <span class="legend-heading">Taxonomy Categories</span>
                <a href="#" class="show-all" id="show-all">Show All</a>
            </div>
            <p class="legend-hint">Click a row to hide a category. Hover a row to highlight it.</p>
            <div class="legend-list" id="legend-list">
                <!-- legend rows are generated by the JS -->
            </div>
            <div class="legend-total" id="legend-total">Showing 20 of 20 nodes</div>
        </div>
    </div>

    <script src="interactive-legend-filter.js"></script>
</body>
</html>
