<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="schema" content="https://dmccreary.github.io/intelligent-textbooks/ns/microsim/v1">
    <title>Interactive Taxonomy Legend and Filter</title>
    <script src="https://cdn.jsdelivr.net/npm/vis-network@9.1.9/standalone/umd/vis-network.min.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/vis-network/styles/vis-network.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Two-column flex layout: graph on the left, fixed legend on the right.
         On narrow viewports the legend stacks below the graph. The graph and
         the legend are SIBLINGS; overlays for the graph (title) live inside
         the graph wrapper as siblings of #network, never as its children. -->
    <div class="container">
        <div class="graph-wrap">
            <div id="network"></div>
            <div class="title">Taxonomy Legend &amp; Filter</div>
        </div>

        <!-- Legend panel: fixed 180px on desktop, stacks below under 600px. -->
        <aside class="legend-panel">
            <div class="legend-header">
                <span class="legend-heading">Taxonomy</span>
                <button class="btn btn-reset" id="reset-btn">Reset</button>
            </div>
            <p class="legend-hint">Click a row to hide it. Use <strong>Only</strong> to isolate one category.</p>
            <div class="legend-list" id="legend-list">
                <!-- legend rows generated by the JS -->
            </div>
        </aside>
    </div>

    <script src="interactive-taxonomy-legend.js"></script>
</body>
</html>
